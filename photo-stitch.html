<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>長圖拼接</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');

  :root {
    --bg: #0e0e12;
    --surface: #1a1a22;
    --card: #22222e;
    --accent: #7c6dfa;
    --accent2: #fa6d9a;
    --text: #f0f0f8;
    --muted: #888899;
    --border: #33334a;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo {
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
    opacity: 0.8;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
  }

  .subtitle {
    margin-top: 8px;
    color: var(--muted);
    font-size: 14px;
    font-weight: 300;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    width: 100%;
    max-width: 480px;
    margin-bottom: 16px;
  }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 32px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }

  .upload-zone:active, .upload-zone.over {
    border-color: var(--accent);
    background: rgba(124,109,250,0.06);
  }

  .upload-zone input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
  }

  .upload-icon {
    font-size: 40px;
    margin-bottom: 10px;
  }

  .upload-zone p {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.5;
  }

  .upload-zone strong {
    color: var(--accent);
  }

  /* Thumbnail list */
  #thumb-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 16px;
  }

  .thumb-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border-radius: 10px;
    padding: 8px 10px;
    position: relative;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity:0; transform: translateY(6px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .thumb-item img {
    width: 52px;
    height: 52px;
    object-fit: cover;
    border-radius: 6px;
    flex-shrink: 0;
  }

  .thumb-info {
    flex: 1;
    font-size: 13px;
    color: var(--muted);
    overflow: hidden;
  }

  .thumb-name {
    color: var(--text);
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }

  .thumb-remove {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 6px;
    line-height: 1;
    flex-shrink: 0;
    transition: color 0.15s;
  }
  .thumb-remove:active { color: var(--accent2); }

  /* Order buttons */
  .order-btns {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .order-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 26px;
    height: 22px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s;
  }
  .order-btn:active { border-color: var(--accent); color: var(--accent); }

  /* Settings */
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .setting-label {
    font-size: 14px;
    color: var(--muted);
  }

  .setting-label strong {
    display: block;
    color: var(--text);
    font-size: 15px;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 130px;
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  .range-val {
    font-size: 13px;
    color: var(--accent);
    width: 36px;
    text-align: right;
  }

  /* Color picker */
  .color-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .color-swatch {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
  }
  .color-swatch.active, .color-swatch:active {
    border-color: var(--text);
    transform: scale(1.15);
  }

  /* Buttons */
  .btn-primary {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity 0.2s, transform 0.15s;
    max-width: 480px;
  }
  .btn-primary:active { opacity: 0.85; transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .btn-save {
    width: 100%;
    max-width: 480px;
    padding: 14px;
    background: var(--surface);
    color: var(--accent);
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    border: 2px solid var(--accent);
    border-radius: 12px;
    cursor: pointer;
    margin-top: 12px;
    transition: background 0.2s;
  }
  .btn-save:active { background: rgba(124,109,250,0.1); }

  /* Preview */
  #preview-wrap {
    width: 100%;
    max-width: 480px;
    margin-top: 8px;
    display: none;
  }

  #preview-wrap .card-title {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  #preview-canvas {
    width: 100%;
    border-radius: 10px;
    display: block;
    border: 1px solid var(--border);
  }

  /* Loading */
  #loading {
    display: none;
    text-align: center;
    padding: 20px;
    color: var(--muted);
    font-size: 14px;
  }

  .spinner {
    display: inline-block;
    width: 22px;
    height: 22px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-hint {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 8px 0 4px;
  }

  .count-badge {
    background: var(--accent);
    color: #fff;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    padding: 2px 9px;
    margin-left: 8px;
  }

  .card-title-row {
    display: flex;
    align-items: center;
    margin-bottom: 14px;
  }
  .card-title-row span {
    font-size: 16px;
    font-weight: 700;
  }
</style>
</head>
<body>

<header>
  <div class="logo">📸 Photo Tool</div>
  <h1>長截圖拼接</h1>
  <p class="subtitle">選多張照片，自動垂直合成長圖</p>
</header>

<!-- Upload -->
<div class="card" style="max-width:480px;width:100%;">
  <div class="card-title-row">
    <span>選擇照片</span>
    <span id="count-badge" class="count-badge" style="display:none">0</span>
  </div>
  <div class="upload-zone" id="upload-zone">
    <input type="file" id="file-input" accept="image/*" multiple>
    <div class="upload-icon">🖼️</div>
    <p>點此選取照片<br><strong>可一次選多張</strong></p>
  </div>
  <div id="thumb-list"></div>
</div>

<!-- Settings -->
<div class="card" style="max-width:480px;width:100%;">
  <div class="card-title-row"><span>設定</span></div>

  <div class="setting-row">
    <div class="setting-label">
      <strong>間距</strong>
      照片之間的空隙
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <input type="range" id="gap-range" min="0" max="60" value="0">
      <span class="range-val" id="gap-val">0px</span>
    </div>
  </div>

  <div class="setting-row" style="margin-bottom:4px">
    <div class="setting-label">
      <strong>間距顏色</strong>
    </div>
    <div class="color-row">
      <div class="color-swatch active" data-color="#ffffff" style="background:#fff"></div>
      <div class="color-swatch" data-color="#000000" style="background:#000"></div>
      <div class="color-swatch" data-color="#f5f5f5" style="background:#f5f5f5;border:1px solid #ccc"></div>
      <div class="color-swatch" data-color="#1a1a22" style="background:#1a1a22"></div>
      <div class="color-swatch" data-color="#7c6dfa" style="background:#7c6dfa"></div>
    </div>
  </div>
</div>

<!-- Generate button -->
<button class="btn-primary" id="gen-btn" disabled>✨ 開始拼接</button>

<div id="loading"><span class="spinner"></span>拼接中，請稍候…</div>

<!-- Preview -->
<div id="preview-wrap">
  <div class="card" style="max-width:480px;width:100%;">
    <div class="card-title">預覽</div>
    <canvas id="preview-canvas"></canvas>
  </div>
  <button class="btn-save" id="save-btn">💾 儲存圖片</button>
  <p style="text-align:center;color:var(--muted);font-size:12px;margin-top:10px;max-width:480px">
    點「儲存圖片」後，長按圖片 → 加入照片，即可存到相簿
  </p>
</div>

<script>
  const fileInput = document.getElementById('file-input');
  const thumbList = document.getElementById('thumb-list');
  const genBtn = document.getElementById('gen-btn');
  const gapRange = document.getElementById('gap-range');
  const gapVal = document.getElementById('gap-val');
  const previewWrap = document.getElementById('preview-wrap');
  const canvas = document.getElementById('preview-canvas');
  const ctx = canvas.getContext('2d');
  const loading = document.getElementById('loading');
  const countBadge = document.getElementById('count-badge');

  let files = []; // {file, url, name, size}
  let gapColor = '#ffffff';

  // Gap slider
  gapRange.addEventListener('input', () => {
    gapVal.textContent = gapRange.value + 'px';
  });

  // Color swatches
  document.querySelectorAll('.color-swatch').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
      gapColor = el.dataset.color;
    });
  });

  // File input
  fileInput.addEventListener('change', e => {
    addFiles(Array.from(e.target.files));
    fileInput.value = '';
  });

  // Drag over
  const zone = document.getElementById('upload-zone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('over');
    addFiles(Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/')));
  });

  function addFiles(newFiles) {
    newFiles.forEach(f => {
      if (!f.type.startsWith('image/')) return;
      const url = URL.createObjectURL(f);
      files.push({ file: f, url, name: f.name, size: f.size });
    });
    renderThumbs();
  }

  function renderThumbs() {
    thumbList.innerHTML = '';
    if (files.length === 0) {
      thumbList.innerHTML = '<p class="empty-hint">尚未選擇任何照片</p>';
      genBtn.disabled = true;
      countBadge.style.display = 'none';
      return;
    }
    countBadge.textContent = files.length;
    countBadge.style.display = 'inline';
    genBtn.disabled = false;

    files.forEach((f, i) => {
      const item = document.createElement('div');
      item.className = 'thumb-item';
      item.innerHTML = `
        <div class="order-btns">
          <button class="order-btn" onclick="moveItem(${i},-1)">▲</button>
          <button class="order-btn" onclick="moveItem(${i},1)">▼</button>
        </div>
        <img src="${f.url}" alt="">
        <div class="thumb-info">
          <div class="thumb-name">${f.name}</div>
          <div>${(f.size/1024).toFixed(0)} KB</div>
        </div>
        <button class="thumb-remove" onclick="removeItem(${i})">✕</button>
      `;
      thumbList.appendChild(item);
    });
  }

  function moveItem(i, dir) {
    const j = i + dir;
    if (j < 0 || j >= files.length) return;
    [files[i], files[j]] = [files[j], files[i]];
    renderThumbs();
  }

  function removeItem(i) {
    URL.revokeObjectURL(files[i].url);
    files.splice(i, 1);
    renderThumbs();
  }

  // Generate
  genBtn.addEventListener('click', async () => {
    if (files.length === 0) return;
    genBtn.disabled = true;
    loading.style.display = 'block';
    previewWrap.style.display = 'none';

    const gap = parseInt(gapRange.value);

    try {
      // Load all images
      const imgs = await Promise.all(files.map(f => loadImage(f.url)));

      // Max width
      const maxW = Math.max(...imgs.map(img => img.naturalWidth));

      // Scale each image to maxW, calc total height
      const scaled = imgs.map(img => {
        const scale = maxW / img.naturalWidth;
        return { img, w: maxW, h: Math.round(img.naturalHeight * scale) };
      });

      const totalH = scaled.reduce((s, i) => s + i.h, 0) + gap * (imgs.length - 1);

      canvas.width = maxW;
      canvas.height = totalH;

      ctx.fillStyle = gapColor;
      ctx.fillRect(0, 0, maxW, totalH);

      let y = 0;
      scaled.forEach((item, idx) => {
        ctx.drawImage(item.img, 0, y, item.w, item.h);
        y += item.h;
        if (idx < scaled.length - 1) y += gap;
      });

      // Show preview (scaled down)
      previewWrap.style.display = 'block';
      previewWrap.scrollIntoView({ behavior: 'smooth', block: 'start' });

    } catch(e) {
      alert('拼接失敗，請重試：' + e.message);
    } finally {
      loading.style.display = 'none';
      genBtn.disabled = false;
    }
  });

  function loadImage(url) {
    return new Promise((res, rej) => {
      const img = new Image();
      img.onload = () => res(img);
      img.onerror = rej;
      img.src = url;
    });
  }

  // Save
  document.getElementById('save-btn').addEventListener('click', () => {
    const a = document.createElement('a');
    a.download = 'stitched_' + Date.now() + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  });
</script>
</body>
</html>
